# Run daily at 3 PM IST: fetch absent list from etimeoffice, send to CEO via Twilio WhatsApp.
name: Absentee list to CEO WhatsApp

on:
  schedule:
    # 3 PM IST = 09:30 UTC (IST = UTC+5:30)
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  send-absent-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run daily absentee report
        env:
          ETIME_COMPANY_ID: ${{ secrets.ETIME_COMPANY_ID }}
          ETIME_USER: ${{ secrets.ETIME_USER }}
          ETIME_PASSWORD: ${{ secrets.ETIME_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          CEO_WHATSAPP_TO: ${{ secrets.CEO_WHATSAPP_TO }}
          HEADLESS: "true"
        run: python -m src.run_daily
